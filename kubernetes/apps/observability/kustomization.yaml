  - ./gatus/ks.yaml
  - ./kube-prometheus-stack/ks.yaml
  - ./victoria-logs/ks.yaml
  - ./fluent-bit/ks.yaml
  - ./grafana/ks.yaml
  - ./network-ups-tools/ks.yaml
  - ./smartctl-exporter/ks.yaml
  - ./teslamate/ks.yaml
  - ./silence-operator/ks.yaml
  - ./keda/ks.yaml
  - ./kromgo/ks.yaml
  - ./unpoller/ks.yaml
  - ./scrutiny/ks.yaml
  
  # Exporters
  - ./exporters