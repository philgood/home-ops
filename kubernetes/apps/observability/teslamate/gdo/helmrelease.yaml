---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tesla-geogdo
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 1h
  values:
    controllers:
      tesla-geogdo:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: brchri/tesla-geogdo
              tag: v2.3.1
            env:
              TZ: Australia/Sydney
            envFrom:
              - secretRef:
                  name: teslagdo-secret
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
    service:
      app:
        ports:
          http:
            port: 8555 
    persistence:
      data:
        existingClaim: tesla-geogdo-data
        globalMounts:
          - path: /data
      options-secret:
        type: secret
        name: teslagdo-secret
        globalMounts:
          - path: /app/config/config.yml
            subPath: config.yml