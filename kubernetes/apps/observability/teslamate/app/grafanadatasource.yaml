---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: teslamate-postgres
  namespace: observability
  annotations:
    kustomize.toolkit.fluxcd.io/substitute: disabled

spec:
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana

  datasources:
  - name: TeslaMate
    type: postgres
    uid: teslamate
    access: proxy
    url: postgres17-rw.database.svc.cluster.local:5432
    user: {{ .TESLAM_POSTGRES_USER }}
    jsonData:
      database: teslamate
      sslmode: "disable"
      maxOpenConns: 100
      maxIdleConns: 100
      maxIdleConnsAuto: true
      connMaxLifetime: 14400
      postgresVersion: 1600
      timescaledb: false
    secureJsonData:
      password: "{{ .TESLAM_POSTGRES_PASS }}" 