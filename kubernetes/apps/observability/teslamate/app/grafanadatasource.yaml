apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: teslamate-postgres
  namespace: observability
  annotations:
    kustomize.toolkit.fluxcd.io/substitute: disabled
spec:
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana

  datasource:
    name: teslamate
    type: postgres
    access: proxy

    # Non-secret fields
    url: postgres17-rw.database.svc.cluster.local:5432
    database: teslamate
    user: dummy

    jsonData:
      postgresVersion: 1700
      sslmode: disable

    # MUST be a map, never empty or null
    secureJsonData:
      password: dummy

    # Flux/Grafana-operator supported secret injection
    valuesFrom:
      - targetPath: user
        valueFrom:
          secretKeyRef:
            name: teslamate-secret
            key: DATABASE_USER

      - targetPath: secureJsonData.password
        valueFrom:
          secretKeyRef:
            name: teslamate-secret
            key: DATABASE_PASS