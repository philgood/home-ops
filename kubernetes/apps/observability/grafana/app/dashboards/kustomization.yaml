---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./default.yaml
  - ./database.yaml
  - ./flux.yaml
  - ./kubernetes.yaml
  - ./network.yaml
  - ./storage.yaml
  - ./teslamate.yaml

configMapGenerator:
  - name: dashboard-cloudnative-pg-cluster
    files:
      - cloudnative-pg-cluster.json
  - name: dashboard-mosquitto-overview
    files:
      - mosquitto-overview.json
  - name: dashboard-unifi-network-combined
    files:
      - unifi-network-combined.json

generatorOptions:
  disableNameSuffixHash: true
