---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/monitoring.coreos.com/prometheusrule_v1.json
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: smartctl-exporter
spec:
  groups:
    - name: smartctl-exporter.rules
      rules:
        - alert: SmartDeviceHighTemperature
          expr: smartctl_device_temperature > 60
          for: 5m
          annotations:
            summary: Drive {{ $labels.device }} on {{ $labels.instance }} temperature is {{ $value }}°C
          labels:
            severity: critical
        - alert: SmartDeviceTestFailed
          expr: smartctl_device_smart_status != 1 or smartctl_device_status != 1
          for: 5m
          annotations:
            summary: Drive {{ $labels.device }} on {{ $labels.instance }} failed SMART test
          labels:
            severity: critical
        - alert: SmartDeviceCriticalWarning
          expr: smartctl_device_critical_warning != 0
          for: 5m
          annotations:
            summary: Drive {{ $labels.device }} on {{ $labels.instance }} has a critical warning
          labels:
            severity: critical
        - alert: SmartDeviceMediaErrors
          expr: smartctl_device_media_errors != 0
          for: 5m
          annotations:
            summary: Drive {{ $labels.device }} on {{ $labels.instance }} has media errors
          labels:
            severity: critical
        - alert: SmartDeviceAvailableSpareUnderThreshold
          expr: smartctl_device_available_spare_threshold > smartctl_device_available_spare
          for: 5m
          annotations:
            summary: Drive {{ $labels.device }} on {{ $labels.instance }} is under available spare threshold
          labels:
            severity: critical
