---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: mosquitto-secret
spec:
  target:
    deletionPolicy: Delete
    template:
      type: Opaque
      data:
        username: "{{ .MOSQUITTO_MQTT_USERNAME }}"
        password: "{{ .MOSQUITTO_MQTT_PASSWORD }}"
        mosquitto_pwd: |-
          {{ .MOSQUITTO_MQTT_USERNAME }}:{{ .MOSQUITTO_MQTT_PASSWORD }}
  data:
    - secretKey: MOSQUITTO_MQTT_USERNAME
      sourceRef:
        storeRef:
          name: bitwarden-login
          kind: ClusterSecretStore
      remoteRef:
        key: 16729afd-30c4-479c-a514-b45891dd3544
        property: username
    - secretKey: MOSQUITTO_MQTT_PASSWORD
      sourceRef:
        storeRef:
          name: bitwarden-login
          kind: ClusterSecretStore
      remoteRef:
        key: 16729afd-30c4-479c-a514-b45891dd3544
        property: password
