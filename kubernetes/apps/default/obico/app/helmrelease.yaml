---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app obico
  namespace: flux-system
spec:
  interval: 15m
  chart:
    spec:
      # renovate: registryUrl=https://bjw-s.github.io/helm-charts
      chart: obico
      version: 0.4.0
      sourceRef:
        kind: HelmRepository
        name: gabe565-charts
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: uninstall
      retries: 3
  dependsOn:
    - name: longhorn
      namespace: storage

  values:
    controllers:
      obico:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/gabe565/obico/web
              tag: sha-50b9a9cf770c3dd444bf7488cb9b1ba5c96dc8fd
            securityContext:
             runAsUser: 0
            env:
              TZ: ${TIMEZONE}
            resources:
              requests:
                cpu: 14m
                memory: 431M
              limits:
                memory: 431M

    service:
      app:
        controller: *app
        nameOverride: *app
        ports:
          http:
            port: 8000

      persistence:
        data:
          enabled: true
          existingClaim: obico-data
        media:
          enabled: true
          existingClaim: obico-media

      ingress:
        app:
          className: external
          annotations:
            external-dns.alpha.kubernetes.io/target: external.${SECRET_DOMAIN}
          hosts:
            - host: &host obico.${SECRET_DOMAIN}
              paths:
                - path: /
                  service:
                    identifier: app
                    port: http
          tls:
            - hosts:
                - *host

    ml-api:
      image:
        repository: ghcr.io/gabe565/obico/ml-api
        tag: sha-50b9a9cf770c3dd444bf7488cb9b1ba5c96dc8fd
      env:
        DEBUG: "False"
