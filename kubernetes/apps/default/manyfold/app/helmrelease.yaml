---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app manyfold
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  dependsOn:
    - name: cloudnative-pg
      namespace: database
    - name: dragonfly-operator
      namespace: storage
  values:
    controllers:
      manyfold:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18.4.0@sha256:5086f94abc783f1147d7c2a32c01db00ab594820026e4f6a82ac2af3dbde7fc7
            envFrom: &envFrom
              - secretRef:
                  name: manyfold-secret
          chown-tmpdirs:
            image:
              repository: docker.io/library/alpine
              tag: 3.23
            command:
              - /bin/sh
              - -c
            args:
              - |
                chmod o-rwx /app/tmp /tmp
            securityContext:
              runAsUser: 0
        containers:
          app:
            image:
              repository: ghcr.io/bjw-s-labs/manyfold
              tag: 0.140.1@sha256:3eac4748a1e9b88301975b89e4838cb30403bdb9ca6311d05f0c9e691ba55036
            # command:
            #   - sleep
            #   - infinity
            env:
              DATABASE_ADAPTER: postgresql
              PORTS: &port 3214
              MULTIUSER: enabled
              PUBLIC_HOSTNAME: 3d.${SECRET_DOMAIN}
              PUBLIC_PORT: "443"
              HTTPS_ONLY: enabled
              TZ: Australia/Sydney
            envFrom: *envFrom
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: *port
                  initialDelaySeconds: 5
                  periodSeconds: 5
                  timeoutSeconds: 3
                  failureThreshold: 24
              readiness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 100m
                memory: 2Gi
              limits:
                memory: 3Gi
    defaultPodOptions:
      securityContext:
        runAsUser: 568
        runAsGroup: 568
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        controller: manyfold
        ports:
          http:
            port: *port
    route:
      app:
        annotations:
          external-dns.alpha.kubernetes.io/target: external.${SECRET_DOMAIN}
        hostnames:
          - 3d.${SECRET_DOMAIN}
        parentRefs:
          - name: envoy-external
            namespace: network  
    persistence:
      media:
        type: nfs
        server: nas.internal
        path: /mnt/DataPool/apps/manyfold
        globalMounts:
          - path: /media
      tmpfs:
        enabled: true
        type: emptyDir
        advancedMounts:
          manyfold:
            app: &tmpdirs
              - path: /tmp
                subPath: host-tmp
                readOnly: false
              - path: /app/tmp
                subPath: app-tmp
                readOnly: false
            chown-tmpdirs: *tmpdirs
