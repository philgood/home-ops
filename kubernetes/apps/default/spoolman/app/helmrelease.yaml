---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2beta1.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app spoolman
  namespace: flux-system
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 3.2.1
      interval: 30m
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system

  values:
    controllers:
      spoolman:
        annotations:
          reloader.stakater.com/auto: "true"

        #pod:
        #  securityContext:
        #    runAsUser: 0
        #    runAsGroup: 1000
        #    fsGroup: 1000
        #    fsGroupChangePolicy: "OnRootMismatch"

        containers:
          app:
            image:
              repository: ghcr.io/donkie/spoolman
              tag: 0.17.0
            securityContext:
              runAsUser: 0
            resources:
              requests:
                cpu: 14m
                memory: 431M
              limits:
                memory: 431M

    service:
      app:
        controller: *app
        nameOverride: *app
        type: LoadBalancer
        annotations:
          io.cilium/lb-ipam-ips: 172.20.24.13
        ports:
          http:
            port: 8000

    ingress:
      app:
        enabled: true
        className: internal
        hosts:
          - host: spoolman.${SECRET_DOMAIN}
            paths:
              - path: /
                service:
                  name: app
                  port: http
        tls:
          - hosts:
              - *host

    persistence:
      config:
        enabled: true
        existingClaim: spoolman-config
        globalMounts:
          - path: /home/app/.local/share/spoolman
