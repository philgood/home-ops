---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app kite
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 1h
  values:
    controllers:
      kite:
        annotations:
          reloader.stakater.com/auto: "true"
        serviceAccount:
          identifier: kite
        containers:
          app:
            image:
              repository: ghcr.io/kite-org/kite
              tag: v0.13.0
            env:
              HOST: https://kite.narden.au
              DB_DSN: /data/db.sqlite
              ENABLE_ANALYTICS: "false"
              ANONYMOUS_USER_ENABLED: "false"
            envFrom:
              - secretRef:
                  name: kite-secret
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 512Mi
    serviceAccount:
      kite: {}
    service:
      app:
        ports:
          http:
            port: 8080
    route:
      app:
        annotations:
          gatus.home-operations.com/endpoint: |-
            conditions: ["[STATUS] == 200"]
        hostnames: ["kite.narden.au"]
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
    persistence:
      data:
        existingClaim: *app
        globalMounts:
          - path: /data
