---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: evcc
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    controllers:
      evcc:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: docker.io/evcc/evcc
              tag: 0.309.0@sha256:da86bf68f1e5a9d00c4b118a660e7b0007e972c1fd2982a87a98943f1c2ed3c8
            env:
              TZ: Australia/Sydney
              EVCC_NETWORK_URI: "https://evcc.narden.au"
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 1Gi
    defaultPodOptions:
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 0
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        forceRename: "evcc"
        primary: true
        ports:
          http:
            port: 7070
      sync:
        type: LoadBalancer
        annotations:
          external-dns.alpha.kubernetes.io/hostname: "evcc-api.narden.au"
          lbipam.cilium.io/ips: 172.20.24.74
        ports:
          ocpp:
            port: 8887
    route:
      app:
        hostnames:
          - "evcc.narden.au"
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: app
                port: http
    persistence:
      config:
        existingClaim: "evcc"
        globalMounts:
          - path: /root/.evcc
      tmpfs:
        type: emptyDir
        advancedMounts:
          evcc:
            app:
              - path: /tmp
                subPath: tmp
              - path: /root
                subPath: root