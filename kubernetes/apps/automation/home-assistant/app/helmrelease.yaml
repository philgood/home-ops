---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app home-assistant
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    defaultPodOptions:
      securityContext:
        runAsUser: 568
        runAsGroup: 568
        fsGroup: 568
        runAsNonRoot: true
        fsGroupChangePolicy: OnRootMismatch
      affinity:
        podAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app.kubernetes.io/instance
                  operator: In
                  values:
                  - home-assistant-code
              topologyKey: kubernetes.io/hostname
    controllers:
      home-assistant:
        annotations:
          reloader.stakater.com/auto: "true"
          secret.reloader.stakater.com/reload: home-assistant-db-secret
        pod:
          annotations:
            k8s.v1.cni.cncf.io/networks: |
              [{
                "name":"multus-iot",
                "namespace": "network",
                "ips": ["172.20.21.200/24"],
                "mac": "3e:59:e4:f7:43:18"
              }]
        containers:
          app:
            image:
              repository: ghcr.io/home-operations/home-assistant
              tag: 2026.5.4@sha256:42d1bc5e99ed0ae8f49b72b8994e25e1a6b0f1467ba26c1b959f54ca42541ffd
            env:
              TZ: Australia/Sydney
              HOME_ASSISTANT_EXTERNAL_URL: https://hass.narden.au
              HASS_HTTP_TRUSTED_PROXY_1: 172.20.20.0/20
              HASS_HTTP_TRUSTED_PROXY_2: 10.42.0.0/16
            envFrom:
              - secretRef:
                  name: home-assistant-secret
          everything-presence-mmwave-configurator:
            dependsOn: app
            image:
              repository: docker.io/everythingsmarthome/everything-presence-mmwave-configurator
              tag: 1.2.2@sha256:866f2fc495d42da2adfde079c31e5830bd69f5c574b6efaafc87a830412d9fd5
            env:
              TZ: Australia/Sydney
              HA_URL: http://127.0.0.1:8123
            envFrom:
              - secretRef:
                  name: home-assistant-secret  
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false
              privileged: false
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    port: 8099
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 2Gi
            securityContext:
              privileged: false
    service:
      app:
        controller: *app
        ports:
          http:
            port: &httpPort 8123
          sonos:
            enabled: true
            port: 1400
            protocol: TCP
          everything-presence-mmwave-configurator:
            enabled: true
            port: &everything-presence-mmwave-configurator 8099
    route:
      app:
        hostnames: 
          - hass.narden.au
        parentRefs:
          - name: envoy-external
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *httpPort
      everything-presence-mmwave-configurator:
        hostnames: 
          - hass-mmwave.narden.au
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *everything-presence-mmwave-configurator
      tesla-key:
        annotations:
          external-dns.alpha.kubernetes.io/target: external.narden.au
        hostnames:
          - hass.narden.au
        parentRefs:
          - name: envoy-external
            namespace: network
            sectionName: https
        rules:
          - matches:
              - path:
                  type: Exact
                  value: /.well-known/appspecific/com.tesla.3p.public-key.pem
            filters:
              - type: URLRewrite
                urlRewrite:
                  path:
                    type: ReplaceFullPath
                    replaceFullPath: /local/.well-known/appspecific/com.tesla.3p.public-key.pem
            backendRefs:
              - identifier: app
                port: *httpPort
    persistence:
      config:
        enabled: true
        existingClaim: *app
        globalMounts:
          - path: /config
      tesla-key:
        type: configMap
        name: home-assistant-tesla-key
        globalMounts:
          - path: /config/www/.well-known/appspecific/com.tesla.3p.public-key.pem
            subPath: com.tesla.3p.public-key.pem
            readOnly: true