cluster:
  id: ${CLUSTER_ID}
  secret: ${CLUSTER_SECRET}
secrets:
  bootstraptoken: ${BOOTSTRAP_TOKEN}
  secretboxencryptionsecret: ${SECRETBOX_ENCRYPTION_SECRET}
trustdinfo:
  token: ${TRUSTD_TOKEN}
certs:
  etcd:
    crt: ${ETCD_CRT}
    key: ${ETCD_KEY}
  k8s:
    crt: ${K8S_CRT}
    key: ${K8S_KEY}
  k8saggregator:
    crt: ${K8S_AGGREGATOR_CRT}
    key: ${K8S_AGGREGATOR_KEY}
  k8sserviceaccount:
    key: ${K8S_SERVICE_ACCOUNT_KEY}
  os:
    crt: ${OS_CRT}
    key: ${OS_KEY}
